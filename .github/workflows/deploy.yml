name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # Allow insecure Docker registry
      - name: Configure Docker Daemon for Insecure Registry
        run: |
          echo '{"insecure-registries": ["209.97.129.148:9004"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t supplycatena:latest .

      # Tag and push the Docker image to the registry (no login required)
      - name: Tag and Push Docker Image
        run: |
          docker tag supplycatena:latest 209.97.129.148:9004/supplycatena:latest
          docker push 209.97.129.148:9004/supplycatena:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Deploy the Docker container on the VPS using SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/schipofya/inventory_management
            docker pull 209.97.129.148:9004/supplycatena:latest
            docker stop supplycatena || true
            docker rm supplycatena || true
            docker run -d --name supplycatena -p 8089:8000 209.97.129.148:9004/supplycatena:latest
