name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Docker BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Allow insecure Docker registry
      - name: Configure Docker Daemon for Insecure Registry
        run: |
          echo '{"insecure-registries": ["209.97.129.148:9004"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t supplycatena:latest .

      # Tag and push the Docker image to the registry
      - name: Tag and Push Docker Image
        run: |
          docker tag supplycatena:latest 209.97.129.148:9004/supplycatena:latest
          docker push 209.97.129.148:9004/supplycatena:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Deploy the Docker container on the VPS using SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/schipofya/inventory_management
            # Pull the latest image from the registry
            docker pull 209.97.129.148:9004/supplycatena:latest || true
            # Stop and remove the old container if it exists
            docker stop supplycatena || true
            docker rm supplycatena || true
            # Run the new container
            docker run -d --name supplycatena -p 8089:8000 209.97.129.148:9004/supplycatena:latest
