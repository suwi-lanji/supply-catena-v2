# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - supply-catena

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_6cab2ef929514b2b81a1ae97e9f320be }}
        password: ${{ secrets.AzureAppService_ContainerPassword_9a71cabd99864b408580aa1ab84e9960 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_6cab2ef929514b2b81a1ae97e9f320be }}/supply-catena:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'supply-catena'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_9bbf7717735f40e4aa72384d91e43c7d }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_6cab2ef929514b2b81a1ae97e9f320be }}/supply-catena:${{ github.sha }}'